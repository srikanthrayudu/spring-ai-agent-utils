site_name: IKOS
site_description: Identity sprawl and privileged access abuse detection for hybrid enterprises
repo_url: https://github.com/srikanthrayudu/spring-ai-agent-utils
repo_name: srikanthrayudu/spring-ai-agent-utils
edit_uri: edit/main/docs/

theme:
  name: readthedocs

nav:
  - Home: index.md
  - Enterprise Expectations: ENTERPRISE_EXPECTATIONS.md
  - Architecture: ARCHITECTURE.md
  - Data Dictionary: DATA_DICTIONARY.md
  - Spring AI Integration: SPRING_AI_AGENT_UTILS_INTEGRATION.md
  - Risk Report: RISK_REPORT.md

markdown_extensions:
  - admonition
  - fenced_code
  - tables
  - toc:
      permalink: true

plugins:
  - search
